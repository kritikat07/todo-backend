# ===== Server =====
server.port=8080

# ===== MySQL Datasource =====
# Create the database first: CREATE DATABASE todo_db;
spring.datasource.url=jdbc:mysql://localhost:3306/todo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== JWT Config =====
# secret should be a Base64 encoded string, at least 256 bits for HS256
jwt.secret=ZmFrZS1zZWNyZXQta2V5LWZvci1qd3QtdG9kby1iYWNrZW5kLXBsZWFzZS1jaGFuZ2UtaW4tcHJvZA==
jwt.expiration.ms=86400000
